<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" aria-labelledby="title-retail">
  <title id="title-retail">Retail storefront icon</title>

  <!-- Store outline -->
  <rect x="6" y="22" width="52" height="36" stroke="#000" stroke-width="3" fill="none" rx="2"/>

  <!-- Awning -->
  <path d="M6 22 H58" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <path d="M8 22 C12 14 20 14 24 22 C28 14 36 14 40 22 C44 14 52 14 56 22" stroke="#000" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Door -->
  <rect x="28" y="36" width="8" height="22" stroke="#000" stroke-width="3" fill="none"/>

  <!-- Left window -->
  <rect x="12" y="30" width="10" height="10" stroke="#000" stroke-width="2" fill="none"/>

  <!-- Right window -->
  <rect x="42" y="30" width="10" height="10" stroke="#000" stroke-width="2" fill="none"/>

  <!-- Sign (hanging) -->
  <rect x="24" y="12" width="16" height="6" rx="1" stroke="#000" stroke-width="2" fill="none"/>
  <line x1="32" y1="18" x2="32" y2="22" stroke="#000" stroke-width="2"/>
</svg>
