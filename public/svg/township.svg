<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none" aria-labelledby="title-township" role="img">
  <title id="title-township">Township icon — houses, building, tree and road</title>

  <!-- Left house -->
  <path d="M6 34 L16 26 L26 34 V50 H6 V34 Z" stroke="#000" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
  <rect x="10" y="38" width="6" height="8" stroke="#000" stroke-width="2" fill="none"/>

  <!-- Right house -->
  <path d="M38 30 L46 24 L54 30 V46 H38 V30 Z" stroke="#000" stroke-width="2.5" stroke-linejoin="round" fill="none"/>
  <rect x="44" y="36" width="6" height="8" stroke="#000" stroke-width="2" fill="none"/>

  <!-- Mid-rise/commercial block (center) -->
  <rect x="22" y="18" width="16" height="22" stroke="#000" stroke-width="2.5" rx="1.5" fill="none"/>
  <g stroke="#000" stroke-width="1.6" fill="none">
    <line x1="26" y1="22" x2="30" y2="22"/>
    <line x1="34" y1="22" x2="38" y2="22"/>
    <line x1="26" y1="28" x2="30" y2="28"/>
    <line x1="34" y1="28" x2="38" y2="28"/>
    <line x1="26" y1="34" x2="30" y2="34"/>
    <line x1="34" y1="34" x2="38" y2="34"/>
  </g>

  <!-- Tree / park -->
  <circle cx="50" cy="50" r="4.5" stroke="#000" stroke-width="2" fill="none"/>
  <rect x="49.2" y="53.5" width="1.6" height="4" rx="0.4" fill="#000"/>

  <!-- Road / main path -->
  <path d="M0 56 H64" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <g stroke="#000" stroke-width="1.8" stroke-linecap="round">
    <path d="M6 56 H12" stroke-dasharray="0 0"/>
    <path d="M18 56 H24"/>
    <path d="M30 56 H36"/>
    <path d="M42 56 H48"/>
    <path d="M54 56 H60"/>
  </g>
</svg>
